<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f3ff" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="screen-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg-gradient)" />
  
  <!-- Abstract Geometric Shapes -->
  <circle cx="100" cy="300" r="150" fill="#007eb8" opacity="0.1" />
  <circle cx="700" cy="50" r="100" fill="#764ba2" opacity="0.1" />
  
  <!-- Desktop Monitor -->
  <g transform="translate(150, 80)">
    <rect x="0" y="0" width="360" height="220" rx="10" fill="#333" />
    <rect x="10" y="10" width="340" height="200" rx="5" fill="white" />
    <!-- Screen Content: Header -->
    <rect x="25" y="25" width="310" height="30" rx="2" fill="#eee" />
    <!-- Screen Content: Grid -->
    <rect x="25" y="65" width="90" height="80" rx="2" fill="url(#screen-gradient)" opacity="0.8" />
    <rect x="135" y="65" width="90" height="80" rx="2" fill="url(#screen-gradient)" opacity="0.6" />
    <rect x="245" y="65" width="90" height="80" rx="2" fill="url(#screen-gradient)" opacity="0.4" />
    <!-- Stand -->
    <path d="M140 220 L220 220 L230 250 L130 250 Z" fill="#444" />
    <rect x="110" y="250" width="140" height="10" rx="2" fill="#333" />
  </g>

  <!-- Laptop/Tablet -->
  <g transform="translate(450, 140)">
    <rect x="0" y="0" width="180" height="130" rx="8" fill="#444" />
    <rect x="8" y="8" width="164" height="114" rx="4" fill="white" />
    <!-- Screen Content -->
    <rect x="15" y="15" width="150" height="20" rx="2" fill="#eee" />
    <rect x="15" y="45" width="65" height="50" rx="2" fill="url(#screen-gradient)" opacity="0.8" />
    <rect x="90" y="45" width="65" height="50" rx="2" fill="url(#screen-gradient)" opacity="0.6" />
  </g>

  <!-- Mobile Phone -->
  <g transform="translate(600, 170)">
    <rect x="0" y="0" width="70" height="120" rx="8" fill="#222" />
    <rect x="4" y="10" width="62" height="100" rx="2" fill="white" />
    <!-- Screen Content -->
    <rect x="8" y="15" width="54" height="10" rx="1" fill="#eee" />
    <rect x="8" y="30" width="54" height="25" rx="1" fill="url(#screen-gradient)" opacity="0.8" />
    <rect x="8" y="60" width="54" height="25" rx="1" fill="url(#screen-gradient)" opacity="0.6" />
    <!-- Home Button -->
    <circle cx="35" cy="115" r="3" fill="#555" />
  </g>

  <!-- Text Label (Optional) -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#555" text-anchor="middle" letter-spacing="2">RESPONSIVE DESIGN</text>
</svg>
